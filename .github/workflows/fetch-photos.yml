name: Fetch Product Photos

on:
  push:
    paths:
      - '.github/workflows/fetch-photos.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download product photos
        run: |
          mkdir -p public/photos
          curl -sL "https://images.unsplash.com/photo-1618324359017-5452b2f4eec9?w=800&q=80&auto=format&fit=crop" -o public/photos/crystal-petal.jpg
          curl -sL "https://images.unsplash.com/photo-1698129851327-a140cfad05b8?w=800&q=80&auto=format&fit=crop" -o public/photos/sunflower-garden.jpg
          curl -sL "https://images.unsplash.com/photo-1720156351990-67afa28e4aca?w=800&q=80&auto=format&fit=crop" -o public/photos/matcha-dream.jpg
          curl -sL "https://images.unsplash.com/photo-1664431439036-5e3675620231?w=800&q=80&auto=format&fit=crop" -o public/photos/coffee-morning.jpg
          curl -sL "https://images.unsplash.com/photo-1601747779082-77a8fe377ecc?w=800&q=80&auto=format&fit=crop" -o public/photos/bubble-cloud.jpg
          curl -sL "https://images.unsplash.com/photo-1528351655744-27cc30462816?w=800&q=80&auto=format&fit=crop" -o public/photos/about-studio.jpg
          ls -la public/photos

      - name: Verify downloads are real images
        run: |
          for f in public/photos/*.jpg; do
            type=$(file --mime-type -b "$f")
            echo "$f -> $type"
            if [[ "$type" != image/* ]]; then
              echo "FAILED: $f is not an image"
              exit 1
            fi
          done

      - name: Commit photos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/photos
          git diff --cached --quiet && echo "No changes" || git commit -m "📸 Self-host product photos via Actions runner"
          git push
